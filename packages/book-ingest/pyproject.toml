[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "book-ingest"
version = "0.1.0"
description = "Lightweight document ingestion interfaces for inkline."
requires-python = ">=3.11"
dependencies = ["book-canonical>=0.1.0"]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
