[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "book-mineru"
version = "0.1.0"
description = "MinerU integration and migrated MinerU normalizer for inkline."
requires-python = ">=3.11"
dependencies = ["book-canonical>=0.1.0"]

[project.scripts]
mineru-to-canonical = "mineru_normalizer.app.cli:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.pyright]
reportMissingTypeArgument = "warning"
reportUnknownMemberType = "warning"
