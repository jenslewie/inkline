[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "book-cli"
version = "0.1.0"
description = "Unified inkline CLI."
requires-python = ">=3.11"
dependencies = [
  "book-canonical>=0.1.0",
  "book-ingest>=0.1.0",
  "book-epub>=0.1.0",
  "book-rag>=0.1.0",
]

[project.scripts]
inkline = "inkline_cli.main:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
