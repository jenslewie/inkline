[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "inkline-parse"
version = "0.1.0"
description = "Parser protocols, registry, orchestration, and format importers for inkline."
requires-python = ">=3.11"
dependencies = ["inkline-canonical>=0.1.0"]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
