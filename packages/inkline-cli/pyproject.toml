[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "inkline-cli"
version = "0.1.0"
description = "Unified inkline CLI."
requires-python = ">=3.11"
dependencies = [
  "inkline-canonical>=0.1.0",
  "inkline-parse>=0.1.0",
  "inkline-epub>=0.1.0",
  "inkline-rag>=0.1.0",
]

[project.scripts]
inkline = "inkline.cli.main:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
