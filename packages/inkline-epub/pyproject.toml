[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "inkline-epub"
version = "0.1.0"
description = "CanonicalDocument to EPUB exporter."
requires-python = ">=3.11"
dependencies = ["inkline-canonical>=0.1.0"]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
